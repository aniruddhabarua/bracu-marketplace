<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist — BRACU Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --secondary: #0f172a;
      --bg: #f8fafc;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --card-bg: #ffffff;
      --glass: rgba(255, 255, 255, 0.85);
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 25px 50px -12px rgb(0 0 0 / 0.15);
      --gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* ── Navbar ── */
    .nav {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
      transition: all 0.3s;
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 80px;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      text-decoration: none;
      background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.03em;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .nav-link {
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .nav-link:hover { color: var(--primary); transform: translateY(-1px); }
    .nav-link.active { color: var(--primary); }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      padding: 10px 24px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-logout:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: #fef2f2;
    }

    /* ── Page Header ── */
    .page-header {
      padding: 60px 0 40px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
    }

    .page-header-left h1 {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--secondary);
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .page-header-left h1 span {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .page-header-left p {
      font-size: 16px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .count-badge {
      background: rgba(59,130,246,0.1);
      color: var(--primary);
      border: 1px solid rgba(59,130,246,0.2);
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 700;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 32px;
      margin-bottom: 80px;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
      border-color: var(--primary);
    }

    .card-img {
      width: 100%;
      height: 240px;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      overflow: hidden;
      position: relative;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .card:hover .card-img img { transform: scale(1.08); }

    .status-pill {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 4px 12px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .status-available { background: #dcfce7; color: #166534; }
    .status-reserved  { background: #fef3c7; color: #92400e; }
    .status-sold      { background: #fee2e2; color: #991b1b; }

    .card-body {
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-category {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 8px;
      letter-spacing: 0.1em;
      opacity: 0.8;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--secondary);
      margin-bottom: 6px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 50px;
    }

    .card-seller {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .card-condition {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      background: var(--bg);
      padding: 4px 12px;
      border-radius: 8px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .card-price {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      margin-top: auto;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      padding-top: 16px;
      border-top: 1px solid var(--bg);
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all 0.2s;
      text-decoration: none;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-buy {
      background: var(--primary);
      color: #fff;
    }

    .btn-buy:hover { background: var(--primary-dark); transform: translateY(-1px); }

    .btn-buy.disabled {
      background: #e2e8f0;
      color: var(--text-muted);
      cursor: not-allowed;
    }
    .btn-buy.disabled:hover { transform: none; }

    .btn-remove {
      background: #fef2f2;
      color: #ef4444;
      border: 1px solid #fecaca;
    }

    .btn-remove:hover {
      background: #fee2e2;
      border-color: #ef4444;
    }

    /* ── Empty State ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 100px 20px;
      background: var(--card-bg);
      border-radius: 32px;
      border: 1px solid var(--border);
    }

    .empty-icon { font-size: 72px; margin-bottom: 20px; }

    .empty h2 {
      font-size: 28px;
      font-weight: 800;
      color: var(--secondary);
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .empty p {
      font-size: 16px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 32px;
    }

    .btn-browse {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--secondary);
      color: #fff;
      padding: 14px 32px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 15px -3px rgba(15,23,42,0.3);
    }

    .btn-browse:hover {
      background: #1e293b;
      transform: translateY(-2px);
      box-shadow: 0 20px 25px -5px rgba(15,23,42,0.2);
    }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 400px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 24px;
    }
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }
    .skel-card { height: 400px; }

    /* ── Footer ── */
    .footer {
      padding: 60px 0;
      border-top: 1px solid var(--border);
      text-align: center;
      background: #fff;
      margin-top: 20px;
    }

    .footer p {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-muted);
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 9999;
      padding: 14px 22px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      color: #fff;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      opacity: 0;
      transform: translateY(20px);
      box-shadow: var(--shadow);
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: #166534; }
    #toast.error   { background: #991b1b; }

    @media (max-width: 768px) {
      .container { padding: 0 20px; }
      .page-header-left h1 { font-size: 32px; }
      .grid { grid-template-columns: 1fr; gap: 20px; }
    }
  </style>
</head>
<body>

<div class="container">
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">BRACU Marketplace</a>
      <div class="nav-links">
        <span class="nav-user" id="navUser"></span>
        <a href="/" class="nav-link">Home</a>
        <a href="/transactions" class="nav-link">Transactions</a>
        <a href="/wishlist" class="nav-link active">Wishlist</a>
        <a href="/profile" class="nav-link">Profile</a>
        <a href="/notifications" class="nav-link">🔔</a>
        <button class="btn-logout" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-left">
      <h1>My <span>Wishlist</span></h1>
      <p>Items you've saved for later</p>
    </div>
    <span class="count-badge" id="countBadge">Loading…</span>
  </div>

  <!-- Cards Grid -->
  <div class="grid" id="wishlistGrid">
    <div class="skeleton skel-card"></div>
    <div class="skeleton skel-card"></div>
    <div class="skeleton skel-card"></div>
  </div>

  <div class="footer">
    <p>BRACU Marketplace — a closed community marketplace</p>
  </div>
</div>

<div id="toast"></div>

<script>
  const TOKEN = localStorage.getItem('token');
  const USER  = JSON.parse(localStorage.getItem('user') || 'null');

  if (!TOKEN || !USER) window.location.href = '/login';

  // Show logged-in user name
  if (USER) {
    document.getElementById('navUser').textContent = USER.full_name;
    document.getElementById('navUser').style.cssText =
      'font-size:14px;font-weight:600;color:#0f172a;background:rgba(59,130,246,0.1);padding:8px 18px;border-radius:12px;';
  }

  const CATEGORY_EMOJI = {
    'Books & Notes': '📚', 'Electronics': '💻', 'Clothing & Accessories': '👕',
    'Stationery & Supplies': '✏️', 'Sports & Fitness': '⚽', 'Food & Beverages': '🍜',
    'Furniture & Decor': '🪑', 'Services': '🛠️', 'Other': '📦'
  };

  async function loadWishlist() {
    try {
      const res  = await fetch('/api/wishlist', {
        headers: { Authorization: `Bearer ${TOKEN}` }
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      render(data.data || []);
    } catch (err) {
      document.getElementById('wishlistGrid').innerHTML =
        `<div class="empty"><div class="empty-icon">⚠️</div>
         <h2>Failed to load</h2>
         <p>Could not fetch your wishlist. Please refresh.</p></div>`;
    }
  }

  function render(items) {
    document.getElementById('countBadge').textContent =
      `${items.length} item${items.length !== 1 ? 's' : ''}`;

    const grid = document.getElementById('wishlistGrid');
    if (items.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-icon">💔</div>
          <h2>Your wishlist is empty</h2>
          <p>Browse the marketplace and save items you love!</p>
          <a href="/" class="btn-browse">🛍️ Explore Listings</a>
        </div>`;
      return;
    }

    grid.innerHTML = items.map(item => {
      const emoji    = CATEGORY_EMOJI[item.category] || '📦';
      const imgHtml  = item.primary_image
        ? `<img src="${item.primary_image}" alt="${escHtml(item.title)}">`
        : emoji;
      const statusLabel = item.status === 'available' ? 'Available'
                        : item.status === 'reserved'  ? 'Reserved' : 'Sold';
      const canBuy   = item.status === 'available';
      const condLabel = (item.condition_type || '').replace('_', ' ');

      return `
        <div class="card" id="card-${item.listing_id}">
          <div class="card-img">
            ${imgHtml}
            <span class="status-pill status-${item.status}">${statusLabel}</span>
          </div>
          <div class="card-body">
            <div class="card-category">${escHtml(item.category || '')}</div>
            <div class="card-title">${escHtml(item.title)}</div>
            <div class="card-seller">By ${escHtml(item.seller_name)}</div>
            <span class="card-condition">${condLabel}</span>
            <div class="card-price">৳ ${Number(item.price).toLocaleString('en-BD')}</div>
            <div class="card-actions">
              <a href="${canBuy ? `/checkout?id=${item.listing_id}` : '#'}"
                 class="btn btn-buy${canBuy ? '' : ' disabled'}"
                 ${!canBuy ? 'onclick="return false;"' : ''}>
                ${canBuy ? '🛒 Buy Now' : '🔒 Unavailable'}
              </a>
              <button class="btn btn-remove" onclick="removeItem(${item.listing_id})">
                🗑 Remove
              </button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  async function removeItem(listingId) {
    try {
      const res  = await fetch(`/api/wishlist/${listingId}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${TOKEN}` }
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);

      const card = document.getElementById(`card-${listingId}`);
      if (card) {
        card.style.transition = 'opacity 0.3s, transform 0.3s';
        card.style.opacity = '0';
        card.style.transform = 'scale(0.95) translateY(-8px)';
        setTimeout(() => { card.remove(); recount(); }, 320);
      }
      showToast('✅ Removed from wishlist', 'success');
    } catch (err) {
      showToast('❌ ' + (err.message || 'Failed to remove'), 'error');
    }
  }

  function recount() {
    const remaining = document.querySelectorAll('.card').length;
    document.getElementById('countBadge').textContent =
      `${remaining} item${remaining !== 1 ? 's' : ''}`;
    if (remaining === 0) {
      document.getElementById('wishlistGrid').innerHTML = `
        <div class="empty">
          <div class="empty-icon">💔</div>
          <h2>Your wishlist is empty</h2>
          <p>Browse the marketplace and save items you love!</p>
          <a href="/" class="btn-browse">🛍️ Explore Listings</a>
        </div>`;
    }
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ''; }, 3000);
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/login';
  }

  loadWishlist();
</script>
</body>
</html>
