<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Listing - BRACU Marketplace</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    /* NAVIGATION */
    nav {
      background: #1a1a2e;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo { font-size: 18px; font-weight: bold; color: #fff; text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user  { font-size: 13px; color: #ccc; }
    .nav-profile {
      font-size: 13px; color: #aaa; text-decoration: none;
      background: none; border: 1px solid #444; padding: 5px 12px;
      border-radius: 5px; cursor: pointer; font-family: Arial, sans-serif;
    }
    .nav-profile:hover { color: #fff; border-color: #888; }
    .nav-logout {
      font-size: 13px; color: #aaa; background: none;
      border: 1px solid #444; padding: 5px 12px; border-radius: 5px;
      cursor: pointer; font-family: Arial, sans-serif;
    }
    .nav-logout:hover { color: #fff; border-color: #888; }

    .content { max-width: 1000px; margin: 0 auto; padding: 24px; }

    .alert {
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 16px;
    }

    .error {
      text-align: center;
      padding: 60px 20px;
      color: #c33;
      font-size: 16px;
    }

    /* LISTING CONTAINER */
    .listing-container {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .listing-main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 24px;
    }

    @media (max-width: 768px) {
      .listing-main { grid-template-columns: 1fr; }
    }

    /* IMAGE GALLERY */
    .image-gallery {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .main-image {
      width: 100%;
      height: 400px;
      background: #f5f5f5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 100px;
      overflow: hidden;
    }

    .main-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumbnails {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 8px;
    }

    .thumbnail {
      width: 100%;
      height: 80px;
      background: #f5f5f5;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .thumbnail:hover { border-color: #ddd; }

    .thumbnail.active { border-color: #1a1a2e; }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* LISTING INFO */
    .listing-info h1 {
      font-size: 28px;
      color: #1a1a2e;
      margin-bottom: 12px;
    }

    .listing-meta {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee;
    }

    .price-tag {
      font-size: 28px;
      font-weight: bold;
      color: #1a1a2e;
    }

    .badge {
      display: inline-block;
      background: #f0f0f0;
      color: #555;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .badge.condition { background: #e3f2fd; color: #1976d2; }
    .badge.category { background: #f3e5f5; color: #7b1fa2; }

    .description {
      color: #333;
      line-height: 1.6;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid #eee;
    }

    .detail-item {
      font-size: 13px;
    }

    .detail-label {
      color: #999;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .detail-value {
      color: #333;
      font-size: 14px;
    }

    /* SELLER CARD */
    .seller-card {
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .seller-header {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .seller-avatar {
      width: 48px;
      height: 48px;
      background: #e8e8e8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .seller-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .seller-info h3 {
      font-size: 14px;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .seller-info p {
      font-size: 12px;
      color: #999;
    }

    .seller-rating {
      font-size: 12px;
      color: #ffc107;
      margin-bottom: 12px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      font-family: Arial, sans-serif;
      margin-bottom: 8px;
    }

    .btn-primary {
      background: #1a1a2e;
      color: #fff;
    }

    .btn-primary:hover { background: #2a2a4e; }

    .btn-secondary {
      background: #fff;
      color: #1a1a2e;
      border: 1px solid #1a1a2e;
    }

    .btn-secondary:hover { background: #f5f5f5; }

    .btn:last-child { margin-bottom: 0; }

    .posted-date {
      font-size: 12px;
      color: #999;
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      font-size: 13px;
      color: #1a1a2e;
      text-decoration: none;
      font-weight: bold;
    }

    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">BRACU Marketplace</a>
  <div class="nav-right">
    <span class="nav-user" id="navUser"></span>
    <a class="nav-profile" href="/profile">👤 Profile</a>
    <button class="nav-logout" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="content">

  <a class="back-link" href="/">← Back to Listings</a>

  <div id="alertBox"></div>
  <div id="loadingBox" class="loading">Loading listing…</div>
  <div id="errorBox" style="display:none;" class="error"></div>
  <div id="listingBox" style="display:none;"></div>

  <!-- SELLER PROFILE MODAL -->
  <div id="sellerModal" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto;">
    <div style="background: #fff; border-radius: 8px; max-width: 500px; margin: 40px auto; padding: 0; box-shadow: 0 4px 16px rgba(0,0,0,0.2);">
      
      <!-- Modal Header -->
      <div style="padding: 24px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin: 0; color: #1a1a2e; font-size: 20px;">Seller Profile</h2>
        <button onclick="closeSellerModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #999;">✕</button>
      </div>

      <!-- Modal Body -->
      <div style="padding: 24px;">
        <div id="sellerProfileContent">Loading seller profile...</div>
      </div>
    </div>
  </div>

</div>

<script src="/js/listings.js"></script>

</body>
</html>
