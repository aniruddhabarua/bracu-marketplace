<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — BRACU Marketplace</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif;
      background: #faf9f7;
      color: #1a1a1a;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px;
    }

   
    .nav {
      padding: 28px 0;
      border-bottom: 1px solid #e8e5e0;
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: #1a1a1a;
    }

    .logo span {
      font-weight: 300;
      color: #c9a03d;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .nav-link {
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      color: #5a5a5a;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: #1a1a1a;
    }

    .nav-user {
      font-size: 14px;
      color: #5a5a5a;
    }

    .btn-logout {
      background: none;
      border: 1px solid #e0ddd8;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      color: #5a5a5a;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: #1a1a1a;
      color: #1a1a1a;
    }

    .back-link {
      display: inline-block;
      margin: 32px 0 24px;
      font-size: 13px;
      color: #aaa;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #c9a03d;
    }

    .alert {
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .alert-success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
    }

    /* Loading & Error */
    .loading, .error {
      text-align: center;
      padding: 80px 20px;
      color: #aaa;
    }

    .error {
      color: #d32f2f;
    }

    .listing-container {
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid #efede8;
      margin-bottom: 48px;
    }

    .listing-main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      padding: 40px;
    }

   

    .image-gallery {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .main-image {
      width: 100%;
      height: 400px;
      background: #f5f3ef;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      overflow: hidden;
    }

    .main-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumbnails {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 12px;
    }

    .thumbnail {
      height: 80px;
      background: #f5f3ef;
      border-radius: 12px;
      cursor: pointer;
      border: 2px solid transparent;
      overflow: hidden;
      transition: all 0.2s;
    }

    .thumbnail:hover {
      border-color: #e0ddd8;
    }

    .thumbnail.active {
      border-color: #c9a03d;
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    
    .listing-info h1 {
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #1a1a1a;
      margin-bottom: 16px;
    }

    .listing-meta {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #efede8;
    }

    .price-tag {
      font-size: 32px;
      font-weight: 500;
      color: #c9a03d;
    }

    .badge {
      display: inline-block;
      background: #f5f3ef;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 12px;
      color: #5a5a5a;
    }

    .badge.condition {
      background: #f5f3ef;
    }

    .badge.category {
      background: #f5f3ef;
    }

    .description {
      color: #5a5a5a;
      line-height: 1.6;
      font-size: 15px;
      margin-bottom: 28px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 28px;
      padding-bottom: 28px;
      border-bottom: 1px solid #efede8;
    }

    .detail-item {
      font-size: 13px;
    }

    .detail-label {
      color: #aaa;
      font-size: 11px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .detail-value {
      color: #1a1a1a;
    }

    /* Seller Card */
    .seller-card {
      background: #faf9f7;
      border-radius: 20px;
      padding: 24px;
    }

    .seller-header {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
      cursor: pointer;
    }

    .seller-avatar {
      width: 56px;
      height: 56px;
      background: #f5f3ef;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      overflow: hidden;
    }

    .seller-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .seller-info h3 {
      font-size: 16px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .seller-info p {
      font-size: 12px;
      color: #aaa;
    }

    .seller-rating {
      font-size: 13px;
      color: #c9a03d;
      margin-bottom: 16px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      font-family: inherit;
      margin-bottom: 10px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #1a1a1a;
      color: #fff;
      border: none;
    }

    .btn-primary:hover {
      background: #333;
    }

    .btn-secondary {
      background: transparent;
      color: #1a1a1a;
      border: 1px solid #e0ddd8;
    }

    .btn-secondary:hover {
      border-color: #c9a03d;
    }

    .posted-date {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e8e5e0;
    }

    
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid #efede8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 20px;
      font-weight: 500;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #aaa;
    }

    .modal-body {
      padding: 24px;
    }

    /* Footer */
    .footer {
      margin-top: 80px;
      padding: 40px 0 60px;
      border-top: 1px solid #efede8;
      text-align: center;
    }

    .footer p {
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">BRACU<span>Marketplace</span></a>
      <div class="nav-links">
        <span class="nav-user" id="navUser"></span>
        <a href="/profile" class="nav-link">Profile</a>
        <button class="btn-logout" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </nav>

  <a href="/" class="back-link">← Back to listings</a>

  <div id="alertBox"></div>
  <div id="loadingBox" class="loading">Loading listing…</div>
  <div id="errorBox" style="display:none;" class="error"></div>
  <div id="listingBox" style="display:none;"></div>

  <!-- Seller Profile Modal -->
  <div id="sellerModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Seller Profile</h2>
        <button class="modal-close" onclick="closeSellerModal()">✕</button>
      </div>
      <div class="modal-body" id="sellerProfileContent">
        Loading...
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>BRACU Marketplace — a closed community marketplace</p>
  </div>
</div>

<script src="/js/listings.js"></script>
</body>
</html>
