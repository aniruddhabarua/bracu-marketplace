<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — BRACU Marketplace</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .nav {
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
      background: rgba(255, 255, 255, 0.95);
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 70px;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      text-decoration: none;
      background: linear-gradient(135deg, #0f172a 0%, #3b82f6 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .nav-link {
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      color: #475569;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: #3b82f6;
    }

    .nav-user {
      font-size: 14px;
      font-weight: 500;
      color: #0f172a;
      background: #f1f5f9;
      padding: 6px 12px;
      border-radius: 20px;
    }

    .btn-logout {
      background: none;
      border: 1px solid #e2e8f0;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: #475569;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: #fef2f2;
    }

    .back-link {
      display: inline-block;
      margin: 24px 0;
      font-size: 14px;
      color: #64748b;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #3b82f6;
    }

    .alert {
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .alert-success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .loading, .error {
      text-align: center;
      padding: 80px 20px;
      color: #94a3b8;
    }

    .error {
      color: #ef4444;
    }

    .listing-container {
      background: #ffffff;
      border-radius: 24px;
      border: 1px solid #e2e8f0;
      margin-bottom: 48px;
      overflow: hidden;
    }

    .listing-main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      padding: 40px;
    }

    @media (max-width: 768px) {
      .listing-main {
        grid-template-columns: 1fr;
        gap: 32px;
        padding: 24px;
      }
    }

    .image-gallery {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .main-image {
      width: 100%;
      height: 400px;
      background: #f1f5f9;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      overflow: hidden;
    }

    .main-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumbnails {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 12px;
    }

    .thumbnail {
      height: 80px;
      background: #f1f5f9;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      overflow: hidden;
      transition: all 0.2s;
    }

    .thumbnail:hover {
      border-color: #cbd5e1;
    }

    .thumbnail.active {
      border-color: #3b82f6;
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .listing-info h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #0f172a;
      margin-bottom: 16px;
    }

    .listing-meta {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e2e8f0;
    }

    .price-tag {
      font-size: 32px;
      font-weight: 700;
      color: #0f172a;
    }

    .status-badge {
      display: inline-block;
      border-radius: 20px;
      font-weight: 500;
      font-size: 12px;
      padding: 4px 12px;
    }

    .badge {
      display: inline-block;
      background: #f1f5f9;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      color: #475569;
    }

    .description {
      color: #475569;
      line-height: 1.6;
      font-size: 15px;
      margin-bottom: 28px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 28px;
      padding-bottom: 28px;
      border-bottom: 1px solid #e2e8f0;
    }

    .detail-item {
      font-size: 13px;
    }

    .detail-label {
      color: #94a3b8;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .detail-value {
      color: #0f172a;
      font-weight: 500;
    }

    .status-selector {
      margin: 16px 0;
      padding: 16px;
      background: #f8fafc;
      border-radius: 16px;
    }

    .status-selector label {
      font-size: 13px;
      font-weight: 600;
      display: block;
      margin-bottom: 12px;
    }

    .status-buttons {
      display: flex;
      gap: 12px;
    }

    .status-btn {
      flex: 1;
      padding: 10px;
      border-radius: 40px;
      border: 1px solid #e2e8f0;
      background: #ffffff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .status-btn.available-active {
      background: #22c55e;
      color: white;
      border-color: #22c55e;
    }

    .status-btn.reserved-active {
      background: #f59e0b;
      color: white;
      border-color: #f59e0b;
    }

    .status-btn.sold-active {
      background: #ef4444;
      color: white;
      border-color: #ef4444;
    }

    .status-btn:hover:not(.available-active):not(.reserved-active):not(.sold-active) {
      background: #f1f5f9;
    }

    .seller-card {
      background: #f8fafc;
      border-radius: 20px;
      padding: 24px;
    }

    .seller-header {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .seller-avatar {
      width: 56px;
      height: 56px;
      background: #e2e8f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      overflow: hidden;
    }

    .seller-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .seller-info h3 {
      font-size: 16px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .seller-info p {
      font-size: 12px;
      color: #64748b;
    }

    .seller-rating {
      font-size: 13px;
      color: #f59e0b;
      margin-top: 6px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      margin-bottom: 10px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #0f172a;
      color: #fff;
      border: none;
    }

    .btn-primary:hover {
      background: #1e293b;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: transparent;
      color: #0f172a;
      border: 1px solid #e2e8f0;
    }

    .btn-secondary:hover {
      border-color: #3b82f6;
      color: #3b82f6;
    }

    .btn-report {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 30px;
      color: #64748b;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-report:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: #fef2f2;
    }

    .posted-date {
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
    }

    .review-section {
      margin-top: 48px;
      padding: 32px;
      border-top: 1px solid #e2e8f0;
    }

    .review-section h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .review-form {
      background: #f8fafc;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .rating-stars {
      display: flex;
      gap: 8px;
      margin: 16px 0;
    }

    .star-btn {
      background: none;
      border: none;
      font-size: 32px;
      cursor: pointer;
      color: #cbd5e1;
      transition: color 0.1s;
    }

    .star-btn.active,
    .star-btn:hover {
      color: #f59e0b;
    }

    .review-textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      min-height: 100px;
      margin-bottom: 16px;
    }

    .review-textarea:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .review-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .review-author {
      font-weight: 600;
      color: #0f172a;
    }

    .review-stars {
      color: #f59e0b;
      font-size: 13px;
    }

    .review-comment {
      color: #475569;
      font-size: 14px;
      margin-top: 8px;
    }

    .review-date {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 8px;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #ffffff;
      border-radius: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #94a3b8;
    }

    .modal-body {
      padding: 24px;
    }

    .footer {
      margin-top: 80px;
      padding: 40px 0;
      border-top: 1px solid #e2e8f0;
      text-align: center;
    }

    .footer p {
      font-size: 13px;
      color: #94a3b8;
    }

    .btn-submit-rating {
      width: 100%;
      padding: 12px;
      background: #0f172a;
      color: #fff;
      border: none;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-submit-rating:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

<div class="container">
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">BRACU Marketplace</a>
      <div class="nav-links">
        <span class="nav-user" id="navUser"></span>
        <a href="/profile" class="nav-link">Profile</a>
        <button class="btn-logout" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </nav>

  <a href="/" class="back-link">← Back to listings</a>

  <div id="alertBox"></div>
  <div id="loadingBox" class="loading">Loading listing…</div>
  <div id="errorBox" style="display:none;" class="error"></div>
  <div id="listingBox"></div>

  <div class="footer">
    <p>BRACU Marketplace — a closed community marketplace</p>
  </div>
</div>

<div id="sellerModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Seller Profile</h2>
      <button class="modal-close" onclick="closeSellerModal()">✕</button>
    </div>
    <div class="modal-body" id="sellerProfileContent">Loading...</div>
  </div>
</div>

<div id="reportModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Report</h2>
      <button class="modal-close" onclick="closeReportModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="reportForm">
        <input type="hidden" id="reportedUserId">
        <div style="margin-bottom: 15px;">
          <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px;">Reason</label>
          <select id="reportReason" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 10px;">
            <option value="">Select a reason</option>
            <option value="Spam or misleading">Spam or misleading</option>
            <option value="Inappropriate content">Inappropriate content</option>
            <option value="Fake or scam listing">Fake or scam listing</option>
            <option value="Harassment or abuse">Harassment or abuse</option>
            <option value="Prohibited item">Prohibited item</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div style="margin-bottom: 20px;">
          <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px;">Additional Details</label>
          <textarea id="reportDetails" style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 10px; min-height: 80px;"></textarea>
        </div>
        <button type="submit" style="width: 100%; padding: 12px; background: #ef4444; color: white; border: none; border-radius: 40px; font-weight: 500; cursor: pointer;">Submit Report</button>
      </form>
    </div>
  </div>
</div>

<div id="ratingModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Rate Seller</h2>
      <button class="modal-close" onclick="closeRatingModal()">✕</button>
    </div>
    <div class="modal-body">
      <p id="ratingSellerName" style="text-align: center; margin-bottom: 16px;"></p>
      <div class="rating-stars" style="justify-content: center;">
        <button class="star-btn" data-val="1">★</button>
        <button class="star-btn" data-val="2">★</button>
        <button class="star-btn" data-val="3">★</button>
        <button class="star-btn" data-val="4">★</button>
        <button class="star-btn" data-val="5">★</button>
      </div>
      <textarea id="ratingComment" class="review-textarea" placeholder="Describe your experience with this seller..."></textarea>
      <button id="submitRatingBtn" class="btn-submit-rating" disabled>Submit Review</button>
    </div>
  </div>
</div>

<script src="/js/listings.js"></script>
</body>
</html>
