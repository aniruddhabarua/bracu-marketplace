<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — BRACU Marketplace</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif;
      background: #faf9f7;
      color: #1a1a1a;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px;
    }

   
    .nav {
      padding: 28px 0;
      border-bottom: 1px solid #e8e5e0;
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: #1a1a1a;
    }

    .logo span {
      font-weight: 300;
      color: #c9a03d;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .nav-link {
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      color: #5a5a5a;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: #1a1a1a;
    }

    .nav-user {
      font-size: 14px;
      color: #5a5a5a;
    }

    .btn-logout {
      background: none;
      border: 1px solid #e0ddd8;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      color: #5a5a5a;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: #1a1a1a;
      color: #1a1a1a;
    }

    .back-link {
      display: inline-block;
      margin: 32px 0 24px;
      font-size: 13px;
      color: #aaa;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #c9a03d;
    }

    .alert {
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .alert-success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
    }

    /* Loading & Error */
    .loading, .error {
      text-align: center;
      padding: 80px 20px;
      color: #aaa;
    }

    .error {
      color: #d32f2f;
    }

    .listing-container {
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid #efede8;
      margin-bottom: 48px;
    }

    .listing-main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      padding: 40px;
    }

   

    .image-gallery {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .main-image {
      width: 100%;
      height: 400px;
      background: #f5f3ef;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      overflow: hidden;
    }

    .main-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumbnails {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 12px;
    }

    .thumbnail {
      height: 80px;
      background: #f5f3ef;
      border-radius: 12px;
      cursor: pointer;
      border: 2px solid transparent;
      overflow: hidden;
      transition: all 0.2s;
    }

    .thumbnail:hover {
      border-color: #e0ddd8;
    }

    .thumbnail.active {
      border-color: #c9a03d;
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    
    .listing-info h1 {
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #1a1a1a;
      margin-bottom: 16px;
    }

    .listing-meta {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #efede8;
    }

    .price-tag {
      font-size: 32px;
      font-weight: 500;
      color: #c9a03d;
    }

    .badge {
      display: inline-block;
      background: #f5f3ef;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 12px;
      color: #5a5a5a;
    }

    .badge.condition {
      background: #f5f3ef;
    }

    .badge.category {
      background: #f5f3ef;
    }

    .description {
      color: #5a5a5a;
      line-height: 1.6;
      font-size: 15px;
      margin-bottom: 28px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 28px;
      padding-bottom: 28px;
      border-bottom: 1px solid #efede8;
    }

    .detail-item {
      font-size: 13px;
    }

    .detail-label {
      color: #aaa;
      font-size: 11px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .detail-value {
      color: #1a1a1a;
    }

    /* Seller Card */
    .seller-card {
      background: #faf9f7;
      border-radius: 20px;
      padding: 24px;
    }

    .seller-header {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
      cursor: pointer;
    }

    .seller-avatar {
      width: 56px;
      height: 56px;
      background: #f5f3ef;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      overflow: hidden;
    }

    .seller-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .seller-info h3 {
      font-size: 16px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .seller-info p {
      font-size: 12px;
      color: #aaa;
    }

    .seller-rating {
      font-size: 13px;
      color: #c9a03d;
      margin-bottom: 16px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      font-family: inherit;
      margin-bottom: 10px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #1a1a1a;
      color: #fff;
      border: none;
    }

    .btn-primary:hover {
      background: #333;
    }

    .btn-secondary {
      background: transparent;
      color: #1a1a1a;
      border: 1px solid #e0ddd8;
    }

    .btn-secondary:hover {
      border-color: #c9a03d;
    }

    .posted-date {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e8e5e0;
    }

    
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid #efede8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 20px;
      font-weight: 500;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #aaa;
    }

    .modal-body {
      padding: 24px;
    }

    /* Footer */
    .footer {
      margin-top: 80px;
      padding: 40px 0 60px;
      border-top: 1px solid #efede8;
      text-align: center;
    }

    .footer p {
      font-size: 12px;
      color: #aaa;
    }

    /* ── Rating stars ── */
    .rating-stars {
      display: flex;
      gap: 8px;
      margin: 16px 0;
      justify-content: center;
    }
    .star-btn {
      background: none;
      border: none;
      font-size: 32px;
      cursor: pointer;
      color: #ddd;
      transition: color 0.1s;
    }
    .star-btn.active { color: #ffc107; }
    .rating-comment {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      margin-bottom: 16px;
      resize: vertical;
      outline: none;
    }
    .rating-comment:focus { border-color: #c9a03d; }
    .btn-submit-rating {
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-submit-rating:disabled { background: #ccc; cursor: not-allowed; }
    .btn-submit-rating:hover:not(:disabled) { background: #333; }

    /* Modern Refined Report Button (Large) */
    .btn-report {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 50px;
      color: #64748b;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-report:hover {
      border-color: #ff4d4f;
      color: #ff4d4f;
      background: #fffbfb;
    }
    .btn-report.minimal {
      border: 1px solid transparent;
      background: transparent;
    }
    .btn-report.minimal:hover {
      border-color: #ff4d4f;
      background: #fffbfb;
    }

        .status-btn {
      transition: all 0.2s ease;
      font-family: inherit;
      font-weight: 500;
    }

    .status-btn:hover:not(.active) {
      background: #e8e5e0 !important;
      color: #1a1a1a !important;
    }

    .status-btn.active {
      cursor: default;
      opacity: 0.9;
    }

    .status-badge {
      display: inline-block;
      border-radius: 20px;
      font-weight: 500;
    }
    
  </style>
</head>
<body>

<div class="container">
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">BRACU<span>Marketplace</span></a>
      <div class="nav-links">
        <span class="nav-user" id="navUser"></span>
        <a href="/profile" class="nav-link">Profile</a>
        <button class="btn-logout" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </nav>

  <a href="/" class="back-link">← Back to listings</a>

  <div id="alertBox"></div>
  <div id="loadingBox" class="loading">Loading listing…</div>
  <div id="errorBox" style="display:none;" class="error"></div>
  <div id="listingBox" style="display:none;"></div>

  <!-- Seller Profile Modal -->
  <div id="sellerModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Seller Profile</h2>
        <button class="modal-close" onclick="closeSellerModal()">✕</button>
      </div>
      <div class="modal-body" id="sellerProfileContent">
        Loading...
      </div>
      <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; display: flex; justify-content: center;">
        <button class="btn-report" id="reportSellerBtn">
          <span>🚩</span> Report Seller
        </button>
      </div>
    </div>
  </div>

  <!-- Report Modal -->
  <div id="reportModal" class="modal-overlay" style="display:none;">
    <div class="modal" style="max-width: 400px;">
      <div class="modal-header">
        <h2>Report User</h2>
        <button class="modal-close" onclick="closeReportModal()">✕</button>
      </div>
      <div class="modal-body">
        <p style="margin-bottom: 20px; color: #666; font-size: 14px;">Please help us understand what's wrong. Your report is anonymous.</p>
        
        <form id="reportForm">
          <input type="hidden" id="reportedUserId">
          <div style="margin-bottom: 15px;">
            <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px;">Reason</label>
            <select id="reportReason" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; font-family: inherit;">
              <option value="">Select a reason</option>
              <option value="Spam or misleading">Spam or misleading</option>
              <option value="Inappropriate content">Inappropriate content</option>
              <option value="Fake or scam listing">Fake or scam listing</option>
              <option value="Harassment or abuse">Harassment or abuse</option>
              <option value="Prohibited item">Prohibited item</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px;">Additional Details (Optional)</label>
            <textarea id="reportDetails" placeholder="Provide more context..." style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; font-family: inherit; height: 80px; resize: none;"></textarea>
          </div>
          <div style="display: flex; gap: 10px;">
            <button type="button" class="btn-submit-rating" style="background: #f5f5f5; color: #333;" onclick="closeReportModal()">Cancel</button>
            <button type="submit" class="btn-submit-rating" style="background: #ff4d4f;">Submit Report</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Rating Modal -->
  <div id="ratingModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Rate Seller</h2>
        <button class="modal-close" onclick="closeRatingModal()">✕</button>
      </div>
      <div class="modal-body">
        <div id="ratingFormArea">
          <p id="ratingSellerName" style="text-align: center; color: #5a5a5a; font-size: 14px; margin-bottom: 8px;"></p>
          <div class="rating-stars" id="starContainer">
            <button class="star-btn" data-val="1">★</button>
            <button class="star-btn" data-val="2">★</button>
            <button class="star-btn" data-val="3">★</button>
            <button class="star-btn" data-val="4">★</button>
            <button class="star-btn" data-val="5">★</button>
          </div>
          <textarea id="ratingComment" class="rating-comment" placeholder="Describe your experience with this seller..."></textarea>
          <button id="submitRatingBtn" class="btn-submit-rating" disabled>Submit Review</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>BRACU Marketplace — a closed community marketplace</p>
  </div>
</div>

<script src="/js/listings.js"></script>
</body>
</html>
