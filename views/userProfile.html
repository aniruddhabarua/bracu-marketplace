<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile - BRACU Marketplace</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      line-height: 1.5;
    }

    .nav {
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
      background: rgba(255, 255, 255, 0.95);
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 70px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      text-decoration: none;
      background: linear-gradient(135deg, #0f172a 0%, #3b82f6 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .nav-link {
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      color: #475569;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: #3b82f6;
    }

    .nav-user {
      font-size: 14px;
      font-weight: 500;
      color: #0f172a;
      background: #f1f5f9;
      padding: 6px 12px;
      border-radius: 20px;
    }

    .btn-logout {
      background: none;
      border: 1px solid #e2e8f0;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: #475569;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: #fef2f2;
    }

    .content {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .profile-card {
      background: #ffffff;
      border-radius: 24px;
      border: 1px solid #e2e8f0;
      padding: 32px;
      margin-bottom: 32px;
    }

    .profile-header {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .profile-picture {
      width: 120px;
      height: 120px;
      background: #f1f5f9;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      overflow: hidden;
      flex-shrink: 0;
      object-fit: cover;
    }

    .profile-picture img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info {
      flex: 1;
    }

    .profile-info h2 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .profile-info p {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 6px;
    }

    .verified-badge {
      display: inline-block;
      background: #dcfce7;
      color: #166534;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 20px;
      margin-left: 8px;
    }

    .profile-rating {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e2e8f0;
      font-size: 13px;
    }

    .stars {
      color: #f59e0b;
    }

    .bio {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
      color: #475569;
      font-size: 14px;
      line-height: 1.6;
    }

    .section-header {
      font-size: 20px;
      font-weight: 600;
      margin: 32px 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 480px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.15);
    }

    .card-img {
      width: 100%;
      height: 150px;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      overflow: hidden;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-body {
      padding: 14px;
    }

    .card-category {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #3b82f6;
      margin-bottom: 4px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-price {
      font-size: 15px;
      font-weight: 700;
      color: #0f172a;
    }

    .review-form-card {
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      padding: 24px;
      margin-bottom: 32px;
    }

    .review-form-card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .star-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .star-selector span {
      font-size: 28px;
      cursor: pointer;
      color: #cbd5e1;
      transition: color 0.1s;
    }

    .star-selector span.active {
      color: #f59e0b;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .btn-submit {
      background: #0f172a;
      color: #ffffff;
      padding: 10px 24px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-submit:hover {
      background: #1e293b;
    }

    .btn-submit:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
    }

    .reviews-list {
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      padding: 20px;
      margin-bottom: 32px;
    }

    .review-item {
      padding: 16px 0;
      border-bottom: 1px solid #e2e8f0;
    }

    .review-item:last-child {
      border-bottom: none;
    }

    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .review-author {
      font-size: 13px;
      font-weight: 600;
      color: #0f172a;
    }

    .review-rating {
      color: #f59e0b;
      font-size: 13px;
    }

    .review-listing {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 6px;
    }

    .review-text {
      font-size: 13px;
      color: #475569;
      line-height: 1.5;
    }

    .review-date {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 6px;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
    }

    .empty .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: #94a3b8;
    }

    .alert {
      padding: 14px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .alert-success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .alert-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .btn-report {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 50px;
      color: #64748b;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-report:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: #fef2f2;
    }

    .footer {
      margin-top: 60px;
      padding: 40px 0;
      border-top: 1px solid #e2e8f0;
      text-align: center;
    }

    .footer p {
      font-size: 13px;
      color: #94a3b8;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #ffffff;
      border-radius: 24px;
      width: 90%;
      max-width: 440px;
      padding: 28px;
    }

    .modal h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .modal p {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 20px;
    }

    .modal .form-group {
      margin-bottom: 16px;
    }

    .modal .form-group label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .modal select,
    .modal textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-family: inherit;
      font-size: 13px;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn-cancel {
      flex: 1;
      padding: 10px;
      background: #f1f5f9;
      color: #475569;
      border: none;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-submit-report {
      flex: 1;
      padding: 10px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="logo">BRACU Marketplace</a>
    <div class="nav-links">
      <span class="nav-user" id="navUser"></span>
      <a href="/" class="nav-link">Home</a>
      <a href="/profile" class="nav-link">My Profile</a>
      <a href="/sell" class="nav-link">Sell</a>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </div>
</nav>

<div class="content">
  <div id="alertBox"></div>
  <div id="pageContent" class="loading">Loading profile...</div>
</div>

<div class="footer">
  <p>BRACU Marketplace — a closed community marketplace</p>
</div>

<div id="reportModal" class="modal-overlay">
  <div class="modal">
    <h3>Report User</h3>
    <p>Help us understand the issue. Your report is anonymous.</p>
    <form onsubmit="handleReportSubmit(event)">
      <input type="hidden" id="reportedUserId">
      <div class="form-group">
        <label>Reason</label>
        <select id="reportReason" required>
          <option value="">Select a reason</option>
          <option value="Spam or misleading">Spam or misleading</option>
          <option value="Inappropriate content">Inappropriate content</option>
          <option value="Fake or scam listing">Fake or scam listing</option>
          <option value="Harassment or abuse">Harassment or abuse</option>
          <option value="Prohibited item">Prohibited item</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Details (Optional)</label>
        <textarea id="reportDetails" placeholder="Tell us more..."></textarea>
      </div>
      <div class="modal-buttons">
        <button type="button" class="btn-cancel" onclick="closeReportModal()">Cancel</button>
        <button type="submit" class="btn-submit-report">Submit Report</button>
      </div>
    </form>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const userId = params.get('id');
  const token = localStorage.getItem('token');
  const me = JSON.parse(localStorage.getItem('user') || 'null');
  let selectedRating = 0;
  let sellerListings = [];

  if (me) document.getElementById('navUser').textContent = 'Hi, ' + me.full_name;

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/login';
  }

  function showAlert(msg, type = 'success') {
    const box = document.getElementById('alertBox');
    box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    setTimeout(() => box.innerHTML = '', 4000);
  }

  function starsHtml(rating) {
    const filled = Math.round(rating);
    return '★'.repeat(filled) + '☆'.repeat(5 - filled);
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function loadProfile() {
    if (!userId) {
      document.getElementById('pageContent').innerHTML =
        '<div class="empty"><div class="icon">⚠️</div><p>No user ID provided. Use <strong>?id=3</strong> in the URL.</p></div>';
      return;
    }

    try {
      const [profileRes, ratingsRes] = await Promise.all([
        fetch(`/api/users/${userId}`),
        fetch(`/api/ratings/seller/${userId}`),
      ]);

      const profileData = await profileRes.json();
      const ratingsData = await ratingsRes.json();

      if (!profileData.success) {
        document.getElementById('pageContent').innerHTML =
          '<div class="empty"><div class="icon">😕</div><p>User not found.</p></div>';
        return;
      }

      const u = profileData.data;
      sellerListings = u.listings || [];
      const isOwnProfile = me && me.user_id === u.user_id;
      document.title = `${u.full_name} - BRACU Marketplace`;

      const avgRating = ratingsData.average_rating;
      const totalReviews = ratingsData.total_reviews;

      const ratingHtml = avgRating
        ? `<span class="stars">${starsHtml(avgRating)}</span> <strong>${avgRating}</strong> / 5 (${totalReviews} review${totalReviews !== 1 ? 's' : ''})`
        : 'No reviews yet';

      const picHtml = u.profile_picture
        ? `<img class="profile-picture" src="${u.profile_picture}" alt="Profile">`
        : `<div class="profile-picture">👤</div>`;

      document.getElementById('pageContent').innerHTML = `
        <div class="profile-card">
          <div class="profile-header">
            ${picHtml}
            <div class="profile-info">
              <h2>${escapeHtml(u.full_name)} ${u.is_verified ? '<span class="verified-badge">✓ Verified</span>' : ''}</h2>
              <p><strong>Department:</strong> ${u.department || 'Not specified'}</p>
              <p><strong>Role:</strong> ${u.role}</p>
              <p><strong>Member since:</strong> ${formatDate(u.member_since)}</p>
              <div class="profile-rating">${ratingHtml}</div>
              ${u.bio ? `<div class="bio">${escapeHtml(u.bio)}</div>` : ''}
            </div>
          </div>
          ${!isOwnProfile ? `
          <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end;">
            <button class="btn-report" onclick="openReportModal(${u.user_id})">
              <span>🚩</span> Report User
            </button>
          </div>
          ` : ''}
        </div>

        <h3 class="section-header">📦 Listings by ${escapeHtml(u.full_name)}</h3>
        <div id="listingsGrid" class="grid"></div>

        ${token && !isOwnProfile ? `
        <h3 class="section-header">✍️ Write a Review</h3>
        <div class="review-form-card">
          <h3>Rate ${escapeHtml(u.full_name)}</h3>
          <div class="form-group">
            <label>Your Rating</label>
            <div class="star-selector" id="starSelector">
              <span onclick="setRating(1)">★</span>
              <span onclick="setRating(2)">★</span>
              <span onclick="setRating(3)">★</span>
              <span onclick="setRating(4)">★</span>
              <span onclick="setRating(5)">★</span>
            </div>
          </div>
          <div class="form-group">
            <label for="reviewListing">Related Listing</label>
            <select id="reviewListing">
              <option value="">-- Select a listing --</option>
              ${sellerListings.map(l => `<option value="${l.listing_id}">${escapeHtml(l.title)}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label for="reviewComment">Comment (optional)</label>
            <textarea id="reviewComment" placeholder="Share your experience..."></textarea>
          </div>
          <button class="btn-submit" onclick="submitReview(${u.user_id})">Submit Review</button>
        </div>
        ` : ''}

        <h3 class="section-header">⭐ Reviews (${totalReviews})</h3>
        <div id="reviewsList" class="reviews-list"></div>
      `;

      renderListings(sellerListings);
      renderReviews(ratingsData.reviews || []);

    } catch (err) {
      console.error(err);
      document.getElementById('pageContent').innerHTML =
        '<div class="empty"><div class="icon">⚠️</div><p>Failed to load profile.</p></div>';
    }
  }

  function renderListings(listings) {
    const grid = document.getElementById('listingsGrid');
    if (!grid) return;
    if (!listings.length) {
      grid.innerHTML = '<div class="empty"><div class="icon">📦</div><p>No active listings.</p></div>';
      return;
    }
    grid.innerHTML = listings.map(l => `
      <a class="card" href="/listings?id=${l.listing_id}">
        <div class="card-img">
          ${l.primary_image ? `<img src="${l.primary_image}" alt="${l.title}">` : '📦'}
        </div>
        <div class="card-body">
          <div class="card-category">${escapeHtml(l.category)}</div>
          <div class="card-title">${escapeHtml(l.title)}</div>
          <div class="card-price">৳${parseFloat(l.price).toLocaleString()}</div>
        </div>
      </a>
    `).join('');
  }

  function renderReviews(reviews) {
    const list = document.getElementById('reviewsList');
    if (!list) return;
    if (!reviews.length) {
      list.innerHTML = '<div class="empty"><div class="icon">💬</div><p>No reviews yet.</p></div>';
      return;
    }
    list.innerHTML = reviews.map(r => `
      <div class="review-item">
        <div class="review-header">
          <span class="review-author">${escapeHtml(r.reviewer_name || 'Anonymous')}</span>
          <span class="review-rating">${starsHtml(r.rating)} (${r.rating}/5)</span>
        </div>
        ${r.listing_title ? `<div class="review-listing">📦 ${escapeHtml(r.listing_title)}</div>` : ''}
        ${r.comment ? `<div class="review-text">${escapeHtml(r.comment)}</div>` : ''}
        <div class="review-date">${formatDate(r.created_at)}</div>
      </div>
    `).join('');
  }

  function setRating(val) {
    selectedRating = val;
    document.querySelectorAll('#starSelector span').forEach((s, i) => {
      s.classList.toggle('active', i < val);
    });
  }

  async function submitReview(seller_id) {
    if (!selectedRating) return showAlert('Please select a star rating.', 'error');

    const listing_id = document.getElementById('reviewListing').value;
    if (!listing_id) return showAlert('Please select a listing.', 'error');

    const comment = document.getElementById('reviewComment').value.trim();

    try {
      const res = await fetch('/api/ratings', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
        },
        body: JSON.stringify({ seller_id, listing_id, rating: selectedRating, comment }),
      });

      const data = await res.json();
      if (!res.ok) return showAlert(data.error || 'Failed to submit review.', 'error');

      showAlert('Review submitted successfully!');
      setTimeout(() => loadProfile(), 1000);
    } catch (err) {
      showAlert('Something went wrong.', 'error');
    }
  }

  function openReportModal(reportedUserId) {
    document.getElementById('reportedUserId').value = reportedUserId;
    document.getElementById('reportModal').classList.add('open');
  }

  function closeReportModal() {
    document.getElementById('reportModal').classList.remove('open');
  }

  async function handleReportSubmit(e) {
    e.preventDefault();
    const reportedId = document.getElementById('reportedUserId').value;
    const reason = document.getElementById('reportReason').value;
    const details = document.getElementById('reportDetails').value;

    try {
      const res = await fetch('/api/reports', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
        },
        body: JSON.stringify({ reported_type: 'user', reported_id: reportedId, reason, details }),
      });

      const data = await res.json();
      if (!res.ok) return showAlert(data.message || 'Failed to submit report.', 'error');

      showAlert('Report submitted. Thank you.');
      closeReportModal();
    } catch (err) {
      showAlert('Something went wrong.', 'error');
    }
  }

  loadProfile();
</script>
</body>
</html>
