<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — BRACU Marketplace</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif;
      background: #faf9f7;
      color: #1a1a1a;
      line-height: 1.5;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 32px;
    }

    
    .nav {
      padding: 28px 0;
      border-bottom: 1px solid #e8e5e0;
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: #1a1a1a;
    }

    .logo span {
      font-weight: 300;
      color: #c9a03d;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .nav-link {
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      color: #5a5a5a;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: #1a1a1a;
    }

    .nav-user {
      font-size: 14px;
      color: #5a5a5a;
    }

    .btn-logout {
      background: none;
      border: 1px solid #e0ddd8;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      color: #5a5a5a;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: #1a1a1a;
      color: #1a1a1a;
    }

   
    .profile-card {
      background: #fff;
      border-radius: 24px;
      border: 1px solid #efede8;
      padding: 32px;
      margin: 32px 0;
    }

    .profile-header {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .profile-picture {
      width: 120px;
      height: 120px;
      background: #f5f3ef;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      overflow: hidden;
      object-fit: cover;
    }

    .profile-info {
      flex: 1;
    }

    .profile-info h2 {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .profile-info p {
      font-size: 14px;
      color: #5a5a5a;
      margin-bottom: 6px;
    }

    .profile-rating {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #efede8;
      color: #c9a03d;
    }

    .bio {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #efede8;
      color: #5a5a5a;
      font-size: 14px;
      line-height: 1.6;
    }

    .profile-actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #1a1a1a;
      color: #fff;
      border: none;
    }

    .btn-primary:hover {
      background: #333;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid #e0ddd8;
      color: #5a5a5a;
    }

    .btn-secondary:hover {
      border-color: #c9a03d;
      color: #1a1a1a;
    }

    /* Edit Form */
    .edit-form {
      display: none;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #efede8;
    }

    .edit-form.show {
      display: block;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e0ddd8;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #c9a03d;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn-save {
      background: #c9a03d;
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-save:hover {
      background: #b8902e;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid #e0ddd8;
      padding: 10px 24px;
      border-radius: 40px;
      font-size: 13px;
      cursor: pointer;
    }

    /* Section Headers */
    .section-header {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin: 40px 0 20px;
    }

   
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: all 0.25s;
      border: 1px solid #efede8;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
    }

    .card-img {
      width: 100%;
      height: 160px;
      background: #f5f3ef;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      overflow: hidden;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-body {
      padding: 14px;
    }

    .card-category {
      font-size: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 4px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-price {
      font-size: 15px;
      font-weight: 500;
      color: #c9a03d;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #efede8;
    }

    .empty .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

   
    .alert {
      padding: 14px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .alert-success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
    }

    .alert-error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ffcdd2;
    }

    
    .footer {
      margin-top: 80px;
      padding: 40px 0 60px;
      border-top: 1px solid #efede8;
      text-align: center;
    }

    .footer p {
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">BRACU<span>Marketplace</span></a>
      <div class="nav-links">
        <span class="nav-user" id="navUser"></span>
        <a href="/" class="nav-link">Browse</a>
        <button class="btn-logout" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </nav>

  <div id="alertBox"></div>
  <div id="pageContent" class="loading">Loading profile...</div>

  <!-- Seller Modal -->
  <div id="sellerModal" class="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:24px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto;">
      <div style="padding:24px; border-bottom:1px solid #efede8; display:flex; justify-content:space-between; align-items:center;">
        <h2 style="font-size:20px; font-weight:500;">Seller Profile</h2>
        <button onclick="closeSellerModal()" style="background:none; border:none; font-size:24px; cursor:pointer; color:#aaa;">✕</button>
      </div>
      <div style="padding:24px;" id="sellerProfileContent">Loading...</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>BRACU Marketplace — a closed community marketplace</p>
  </div>
</div>

<script src="/js/profile.js"></script>
</body>
</html>
