<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — BRACU Marketplace</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .nav {
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
      background: rgba(255, 255, 255, 0.95);
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 70px;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      text-decoration: none;
      background: linear-gradient(135deg, #0f172a 0%, #3b82f6 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .nav-link {
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      color: #475569;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: #3b82f6;
    }

    .nav-user {
      font-size: 14px;
      font-weight: 500;
      color: #0f172a;
      background: #f1f5f9;
      padding: 6px 12px;
      border-radius: 20px;
    }

    .btn-logout {
      background: none;
      border: 1px solid #e2e8f0;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: #475569;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: #fef2f2;
    }

    .profile-card {
      background: #ffffff;
      border-radius: 24px;
      border: 1px solid #e2e8f0;
      padding: 32px;
      margin: 32px 0;
    }

    .profile-header {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .profile-picture {
      width: 120px;
      height: 120px;
      background: #f1f5f9;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      overflow: hidden;
      object-fit: cover;
    }

    .profile-picture img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info {
      flex: 1;
    }

    .profile-info h2 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .profile-info p {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 6px;
    }

    .verified-badge {
      display: inline-block;
      background: #dcfce7;
      color: #166534;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 8px;
    }

    .profile-rating {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e2e8f0;
      color: #f59e0b;
    }

    .bio {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
      color: #475569;
      font-size: 14px;
      line-height: 1.6;
    }

    .profile-actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #0f172a;
      color: #fff;
      border: none;
    }

    .btn-primary:hover {
      background: #1e293b;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid #e2e8f0;
      color: #64748b;
    }

    .btn-secondary:hover {
      border-color: #3b82f6;
      color: #3b82f6;
    }

    .edit-form {
      display: none;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e2e8f0;
    }

    .edit-form.show {
      display: block;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn-save {
      background: #0f172a;
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-save:hover {
      background: #1e293b;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid #e2e8f0;
      padding: 10px 24px;
      border-radius: 40px;
      font-size: 13px;
      cursor: pointer;
    }

    .section-header {
      font-size: 20px;
      font-weight: 600;
      margin: 40px 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    @media (max-width: 768px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      border: 1px solid #e2e8f0;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.15);
    }

    .card-img {
      width: 100%;
      height: 160px;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      overflow: hidden;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-body {
      padding: 14px;
    }

    .card-category {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #3b82f6;
      margin-bottom: 4px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-price {
      font-size: 15px;
      font-weight: 700;
      color: #0f172a;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
    }

    .empty .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .alert {
      padding: 14px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .alert-success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .alert-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .reviews-list {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      padding: 20px;
    }

    .review-item {
      padding: 16px 0;
      border-bottom: 1px solid #e2e8f0;
    }

    .review-item:last-child {
      border-bottom: none;
    }

    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .review-author {
      font-weight: 600;
      color: #0f172a;
    }

    .review-rating {
      color: #f59e0b;
    }

    .review-text {
      color: #475569;
      font-size: 13px;
      margin-top: 6px;
    }

    .review-date {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 6px;
    }

    .footer {
      margin-top: 80px;
      padding: 40px 0;
      border-top: 1px solid #e2e8f0;
      text-align: center;
    }

    .footer p {
      font-size: 13px;
      color: #94a3b8;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #ffffff;
      border-radius: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #94a3b8;
    }

    .modal-body {
      padding: 24px;
    }
  </style>
</head>
<body>

<div class="container">
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">BRACU Marketplace</a>
      <div class="nav-links">
        <span class="nav-user" id="navUser"></span>
        <a href="/" class="nav-link">Browse</a>
        <a href="/transactions" class="nav-link">Transactions</a>
        <a href="/wishlist" class="nav-link">Wishlist</a>
        <button class="btn-logout" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </nav>

  <div id="alertBox"></div>
  <div id="pageContent">
    <div class="loading">Loading profile...</div>
  </div>

  <div class="footer">
    <p>BRACU Marketplace — a closed community marketplace</p>
  </div>
</div>

<div id="sellerModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Seller Profile</h2>
      <button class="modal-close" onclick="closeSellerModal()">✕</button>
    </div>
    <div class="modal-body" id="sellerProfileContent">Loading...</div>
  </div>
</div>

<script src="/js/profile.js"></script>
</body>
</html>
