<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — BRACU Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --secondary: #0f172a;
      --bg: #f8fafc;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --card-bg: rgba(255, 255, 255, 0.9);
      --glass: rgba(255, 255, 255, 0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: #f1f5f9;
      background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, rgba(139, 92, 246, 0.1) 0, transparent 50%), 
        radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.1) 0, transparent 50%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 40px;
      width: 100%;
      max-width: 520px;
      padding: 60px;
      box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.6);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--primary), #8b5cf6, #ec4899);
    }

    .logo {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo p {
      font-size: 15px;
      color: var(--text-muted);
      margin-top: 10px;
      font-weight: 500;
    }

    .tabs {
      display: flex;
      gap: 8px;
      background: rgba(15, 23, 42, 0.04);
      padding: 8px;
      border-radius: 20px;
      margin-bottom: 40px;
      border: 1px solid rgba(15, 23, 42, 0.02);
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 14px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tab:hover {
      color: var(--secondary);
    }

    .tab.active {
      background: #ffffff;
      color: var(--secondary);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
    }

    .panel {
      display: none;
      animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .panel.active {
      display: block;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--secondary);
      margin-bottom: 10px;
      margin-left: 4px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid var(--border);
      border-radius: 18px;
      font-size: 15px;
      font-family: inherit;
      background: rgba(255, 255, 255, 0.8);
      outline: none;
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .btn {
      width: 100%;
      padding: 18px;
      background: var(--secondary);
      color: #ffffff;
      border: none;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 12px;
      box-shadow: 0 10px 20px -5px rgba(15, 23, 42, 0.2);
    }

    .btn:hover {
      background: #1e293b;
      transform: translateY(-2px);
      box-shadow: 0 20px 30px -10px rgba(15, 23, 42, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .alert {
      padding: 18px 20px;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
      display: none;
    }

    .alert.error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fee2e2;
      display: block;
    }

    .alert.success {
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #dcfce7;
      display: block;
    }

    .info-text {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 40px;
      padding-top: 32px;
      border-top: 1px solid rgba(15, 23, 42, 0.06);
      font-weight: 500;
    }

    .info-text a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .info-text a:hover {
      text-decoration: underline;
    }

  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>BRACU Marketplace</h1>
    <p>Buy & sell within the BRACU community</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('register')">Create Account</div>
  </div>

  <div class="alert" id="alertBox"></div>

  <div class="panel active" id="loginPanel">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@bracu.ac.bd" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>

  </div>

  <div class="panel" id="registerPanel">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="regName" placeholder="Your full name">
    </div>
    <div class="form-group">
      <label>BRACU Email</label>
      <input type="email" id="regEmail" placeholder="you@bracu.ac.bd">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Role</label>
        <select id="regRole">
          <option value="student">Student</option>
          <option value="faculty">Faculty</option>
          <option value="staff">Staff</option>
          <option value="alumni">Alumni</option>
        </select>
      </div>
      <div class="form-group">
        <label>Department</label>
        <input type="text" id="regDept" placeholder="e.g. CSE, BBA">
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Min 6 characters">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="regConfirm" placeholder="Repeat password">
    </div>
    <button class="btn" id="registerBtn" onclick="handleRegister()">Create Account</button>
  </div>

  <div class="info-text">
    Only <strong>@bracu.ac.bd</strong> or <strong>@g.bracu.ac.bd</strong> emails are allowed
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (token && user) {
    window.location.href = user.role === 'admin' ? '/admin' : '/';
  }

  function switchTab(tab) {
    const tabs = document.querySelectorAll('.tab');
    const panels = document.querySelectorAll('.panel');
    
    tabs.forEach((t, i) => {
      t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
    });
    
    panels.forEach((p, i) => {
      p.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
    });
    
    clearAlert();
  }

  function showAlert(msg, type = 'error') {
    const box = document.getElementById('alertBox');
    box.textContent = msg;
    box.className = 'alert ' + type;
  }

  function clearAlert() {
    document.getElementById('alertBox').className = 'alert';
  }

  async function handleLogin() {
    clearAlert();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
      return showAlert('Please fill in all fields.');
    }
    
    if (!email.includes('@bracu.ac.bd') && !email.includes('@g.bracu.ac.bd')) {
      return showAlert('Only BRACU email addresses are allowed.');
    }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      
      const data = await res.json();
      
      if (!data.success) {
        showAlert(data.message || 'Login failed.');
      } else {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = data.user.role === 'admin' ? '/admin' : '/';
      }
    } catch (err) {
      showAlert('Server error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  async function handleRegister() {
    clearAlert();
    
    const full_name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const role = document.getElementById('regRole').value;
    const department = document.getElementById('regDept').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    
    if (!full_name || !email || !password || !confirm) {
      return showAlert('Please fill in all required fields.');
    }
    
    if (!email.includes('@bracu.ac.bd') && !email.includes('@g.bracu.ac.bd')) {
      return showAlert('Only BRACU email addresses are allowed.');
    }
    
    if (password.length < 6) {
      return showAlert('Password must be at least 6 characters.');
    }
    
    if (password !== confirm) {
      return showAlert('Passwords do not match.');
    }
    
    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.textContent = 'Creating account...';
    
    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ full_name, email, password, role, department }),
      });
      
      const data = await res.json();
      
      if (!data.success) {
        showAlert(data.message || 'Registration failed.');
      } else {
        showAlert('Account created! You can now sign in.', 'success');
        setTimeout(() => switchTab('login'), 1500);
      }
    } catch (err) {
      showAlert('Server error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('loginPanel').classList.contains('active')) {
      handleLogin();
    } else {
      handleRegister();
    }
  });
</script>
</body>
</html>
