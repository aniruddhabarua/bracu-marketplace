<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRACU Marketplace — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo h1 { font-size: 22px; color: #1a1a2e; }
    .logo p  { font-size: 13px; color: #888; margin-top: 4px; }

    .tabs {
      display: flex;
      border-bottom: 2px solid #eee;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    .tab.active { color: #1a1a2e; border-bottom-color: #1a1a2e; }

    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #444;
      margin-bottom: 5px;
    }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      outline: none;
    }
    input:focus, select:focus { border-color: #1a1a2e; }

    .btn {
      width: 100%;
      padding: 11px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 6px;
      font-family: Arial, sans-serif;
    }
    .btn:hover { background: #2a2a4e; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .alert {
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .alert.error   { background: #fff0f0; color: #c00; border: 1px solid #fcc; display: block; }
    .alert.success { background: #f0fff4; color: #070; border: 1px solid #9e9; display: block; }

    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>BRACU Marketplace</h1>
    <p>Buy &amp; sell within the BRACU community</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab"        onclick="switchTab('register')">Register</div>
  </div>

  <div class="alert" id="alertBox"></div>


  <div class="panel active" id="loginPanel">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@bracu.ac.bd">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password">
    </div>
    <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
  </div>


  <div class="panel" id="registerPanel">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="regName" placeholder="Your full name">
    </div>
    <div class="form-group">
      <label>BRACU Email</label>
      <input type="email" id="regEmail" placeholder="you@bracu.ac.bd">
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="regRole">
        <option value="student">Student</option>
        <option value="faculty">Faculty</option>
        <option value="staff">Staff</option>
        <option value="alumni">Alumni</option>
      </select>
    </div>
    <div class="form-group">
      <label>Department</label>
      <input type="text" id="regDept" placeholder="e.g. CSE, EEE, BBA">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Min 6 characters">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="regConfirm" placeholder="Repeat password">
    </div>
    <button class="btn" id="registerBtn" onclick="handleRegister()">Create Account</button>
  </div>
</div>

<script>
  const t = localStorage.getItem('token');
  const u = JSON.parse(localStorage.getItem('user') || 'null');
  if (t && u) window.location.href = u.role === 'admin' ? '/admin' : '/';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((el, i) => {
      el.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
    });
    document.getElementById('loginPanel').classList.toggle('active', tab==='login');
    document.getElementById('registerPanel').classList.toggle('active', tab==='register');
    clearAlert();
  }

  function showAlert(msg, type='error') {
    const b = document.getElementById('alertBox');
    b.textContent = msg; b.className = 'alert ' + type;
  }
  function clearAlert() { document.getElementById('alertBox').className = 'alert'; }

  async function handleLogin() {
    clearAlert();
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return showAlert('Please fill in all fields.');

    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const res  = await fetch('/api/auth/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!data.success) {
        showAlert(data.message || 'Login failed.');
      } else {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = data.user.role === 'admin' ? '/admin' : '/';
      }
    } catch { showAlert('Server error. Please try again.'); }
    finally { btn.disabled=false; btn.textContent='Sign In'; }
  }

  async function handleRegister() {
    clearAlert();
    const full_name  = document.getElementById('regName').value.trim();
    const email      = document.getElementById('regEmail').value.trim();
    const role       = document.getElementById('regRole').value;
    const department = document.getElementById('regDept').value.trim();
    const password   = document.getElementById('regPassword').value;
    const confirm    = document.getElementById('regConfirm').value;

    if (!full_name||!email||!password||!confirm) return showAlert('Please fill in all required fields.');
    if (!['@bracu.ac.bd','@g.bracu.ac.bd'].some(d=>email.endsWith(d)))
      return showAlert('Only BRACU email addresses are allowed.');
    if (password.length < 6) return showAlert('Password must be at least 6 characters.');
    if (password !== confirm) return showAlert('Passwords do not match.');

    const btn = document.getElementById('registerBtn');
    btn.disabled=true; btn.textContent='Creating account…';
    try {
      const res  = await fetch('/api/auth/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ full_name, email, password, role, department }),
      });
      const data = await res.json();
      if (!data.success) showAlert(data.message || 'Registration failed.');
      else { showAlert('Account created! You can now sign in.','success'); setTimeout(()=>switchTab('login'),1500); }
    } catch { showAlert('Server error. Please try again.'); }
    finally { btn.disabled=false; btn.textContent='Create Account'; }
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('loginPanel').classList.contains('active')) handleLogin();
    else handleRegister();
  });
</script>
</body>
</html>
