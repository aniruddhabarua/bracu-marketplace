<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — BRACU Marketplace</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 32px;
      width: 100%;
      max-width: 480px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #0f172a 0%, #3b82f6 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo p {
      font-size: 13px;
      color: #64748b;
      margin-top: 6px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      background: #f1f5f9;
      padding: 6px;
      border-radius: 60px;
      margin-bottom: 32px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      border-radius: 40px;
      transition: all 0.2s;
    }

    .tab.active {
      background: #ffffff;
      color: #0f172a;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #0f172a;
      color: #ffffff;
      border: none;
      border-radius: 40px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn:hover {
      background: #1e293b;
      transform: translateY(-1px);
    }

    .btn:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .alert.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
      display: block;
    }

    .alert.success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
      display: block;
    }

    .info-text {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
    }

    .info-text a {
      color: #3b82f6;
      text-decoration: none;
    }

    .info-text a:hover {
      text-decoration: underline;
    }

    .demo-credentials {
      background: #f8fafc;
      border-radius: 12px;
      padding: 12px;
      margin-top: 16px;
      font-size: 11px;
      text-align: center;
      color: #64748b;
    }

    .demo-credentials span {
      font-family: monospace;
      background: #e2e8f0;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>BRACU Marketplace</h1>
    <p>Buy & sell within the BRACU community</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('register')">Create Account</div>
  </div>

  <div class="alert" id="alertBox"></div>

  <div class="panel active" id="loginPanel">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@bracu.ac.bd" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
    <div class="demo-credentials">
      🔐 Demo: <span>admin@bracu.ac.bd</span> / <span>password123</span>
    </div>
  </div>

  <div class="panel" id="registerPanel">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="regName" placeholder="Your full name">
    </div>
    <div class="form-group">
      <label>BRACU Email</label>
      <input type="email" id="regEmail" placeholder="you@bracu.ac.bd">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Role</label>
        <select id="regRole">
          <option value="student">Student</option>
          <option value="faculty">Faculty</option>
          <option value="staff">Staff</option>
          <option value="alumni">Alumni</option>
        </select>
      </div>
      <div class="form-group">
        <label>Department</label>
        <input type="text" id="regDept" placeholder="e.g. CSE, BBA">
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Min 6 characters">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="regConfirm" placeholder="Repeat password">
    </div>
    <button class="btn" id="registerBtn" onclick="handleRegister()">Create Account</button>
  </div>

  <div class="info-text">
    Only <strong>@bracu.ac.bd</strong> or <strong>@g.bracu.ac.bd</strong> emails are allowed
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (token && user) {
    window.location.href = user.role === 'admin' ? '/admin' : '/';
  }

  function switchTab(tab) {
    const tabs = document.querySelectorAll('.tab');
    const panels = document.querySelectorAll('.panel');
    
    tabs.forEach((t, i) => {
      t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
    });
    
    panels.forEach((p, i) => {
      p.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
    });
    
    clearAlert();
  }

  function showAlert(msg, type = 'error') {
    const box = document.getElementById('alertBox');
    box.textContent = msg;
    box.className = 'alert ' + type;
  }

  function clearAlert() {
    document.getElementById('alertBox').className = 'alert';
  }

  async function handleLogin() {
    clearAlert();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
      return showAlert('Please fill in all fields.');
    }
    
    if (!email.includes('@bracu.ac.bd') && !email.includes('@g.bracu.ac.bd')) {
      return showAlert('Only BRACU email addresses are allowed.');
    }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      
      const data = await res.json();
      
      if (!data.success) {
        showAlert(data.message || 'Login failed.');
      } else {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = data.user.role === 'admin' ? '/admin' : '/';
      }
    } catch (err) {
      showAlert('Server error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  async function handleRegister() {
    clearAlert();
    
    const full_name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const role = document.getElementById('regRole').value;
    const department = document.getElementById('regDept').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    
    if (!full_name || !email || !password || !confirm) {
      return showAlert('Please fill in all required fields.');
    }
    
    if (!email.includes('@bracu.ac.bd') && !email.includes('@g.bracu.ac.bd')) {
      return showAlert('Only BRACU email addresses are allowed.');
    }
    
    if (password.length < 6) {
      return showAlert('Password must be at least 6 characters.');
    }
    
    if (password !== confirm) {
      return showAlert('Passwords do not match.');
    }
    
    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.textContent = 'Creating account...';
    
    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ full_name, email, password, role, department }),
      });
      
      const data = await res.json();
      
      if (!data.success) {
        showAlert(data.message || 'Registration failed.');
      } else {
        showAlert('Account created! You can now sign in.', 'success');
        setTimeout(() => switchTab('login'), 1500);
      }
    } catch (err) {
      showAlert('Server error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('loginPanel').classList.contains('active')) {
      handleLogin();
    } else {
      handleRegister();
    }
  });
</script>
</body>
</html>
